name: Docs

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# Only one deployment at a time; cancel in-progress on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyfector and pdoc
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pdoc>=16"

      - name: Build pdoc HTML
        run: |
          rm -rf docs-site
          pdoc --output-dir docs-site pyfector

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
